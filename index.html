<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <title>Wallspace</title>
</head>
<body>
    <div id="custom-drag-cursor">
        <img src="images/hands/cursor-hand-frames.gif" alt="">
    </div>

    <div class="main-layout">
        <div class="workspace" id="workspace">
            <!-- Lighting overlay (time-of-day effect) -->
            <div id="lighting-overlay"></div>

            <!-- Room ceiling -->
            <div id="room-ceiling"></div>

            <!-- Wall surface -->
            <div class="wall-container" id="wallContainer">
                <svg id="distanceGuidesSVG" class="distance-guides-svg"></svg>
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleImageUpload(event)" style="display: none;">
                <button class="wall-icon upload-icon" onclick="document.getElementById('fileInput').click()" title="Upload Images">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="wall-icon save-icon" onclick="saveLayout()" title="Save Layout">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H16L21 8V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17 21V13H7V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M7 3V8H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="wall-icon delete-icon" onclick="clearWall()" title="Clear Wall">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 6H5H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <!-- Baseboard strip -->
            <div id="room-baseboard"></div>

            <!-- Room floor -->
            <div id="room-floor"></div>
        </div>
    </div>

    <!-- Floating icon bar -->
    <div id="icon-bar">
        <button class="icon-btn" id="icon-wall" onclick="toggleDialog('dialog-wall')" title="Wall Settings">🏠</button>
        <button class="icon-btn" id="icon-artwork" onclick="toggleDialog('dialog-artwork')" title="Artwork Settings">🖌️</button>
        <button class="icon-btn" id="icon-time" onclick="toggleDialog('dialog-time')" title="Time of Day">🕐</button>
        <button class="icon-btn" id="icon-library" onclick="toggleDialog('dialog-library')" title="Collection">🖼️</button>
        <button class="icon-btn icon-btn-hide" id="icon-bar-hide" onclick="toggleIconBar()" title="Hide controls">↓</button>
    </div>

    <!-- Small tab to restore icon bar when hidden -->
    <div id="icon-bar-show" onclick="toggleIconBar()" title="Show controls">↑</div>

    <!-- Wall Settings Dialog -->
    <div id="dialog-wall" class="settings-dialog">
        <h4>Wall Settings</h4>
        <div class="form-group">
            <label for="wallUnits">Units</label>
            <select id="wallUnits" onchange="updateWallUnits()">
                <option value="inches">Inches</option>
                <option value="cm">Centimeters</option>
            </select>
        </div>
        <div class="form-group">
            <label for="wallWidth">Width (<span id="wallWidthUnit">inches</span>)</label>
            <input type="number" id="wallWidth" value="120" min="24" max="300">
        </div>
        <div class="form-group">
            <label for="wallHeight">Height (<span id="wallHeightUnit">inches</span>)</label>
            <input type="number" id="wallHeight" value="96" min="24" max="200">
        </div>
        <div class="form-group">
            <label for="wallColor">Wall Color</label>
            <input type="color" id="wallColor" value="#ffffff" class="color-input">
        </div>
        <div class="form-group">
            <label for="wallImageUpload">Background Image</label>
            <input type="file" id="wallImageUpload" accept="image/*" onchange="handleWallImageUpload(event)">
            <button onclick="removeWallImage()" class="btn-small">Remove Image</button>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="showDistanceGuides" checked onchange="toggleDistanceGuides()"> Show Distance Guides
            </label>
        </div>
        <button onclick="updateWall()">Update Wall</button>
    </div>

    <!-- Artwork Settings Dialog -->
    <div id="dialog-artwork" class="settings-dialog">
        <h4>Artwork Settings</h4>
        <div class="form-group">
            <label for="sidebarArtworkUnits">Units</label>
            <select id="sidebarArtworkUnits" onchange="updateArtworkUnits()">
                <option value="inches">Inches</option>
                <option value="cm">Centimeters</option>
            </select>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="sidebarMaintainRatio" checked onchange="updateArtworkSize()"> Lock Aspect Ratio
            </label>
        </div>
        <div class="control-row">
            <div class="form-group">
                <label for="sidebarArtworkWidth">Width (<span id="sidebarArtworkWidthUnit">inches</span>)</label>
                <input type="number" id="sidebarArtworkWidth" step="0.1" min="1" onchange="updateArtworkSize()">
            </div>
            <div class="form-group">
                <label for="sidebarArtworkHeight">Height (<span id="sidebarArtworkHeightUnit">inches</span>)</label>
                <input type="number" id="sidebarArtworkHeight" step="0.1" min="1" onchange="updateArtworkSize()">
            </div>
        </div>
        <div class="control-row">
            <div class="form-group">
                <label><input type="checkbox" id="sidebarHasFrame" onchange="updateSelectedArtwork()"> Add Frame</label>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="sidebarHasMatte" onchange="updateSelectedArtwork()"> Add Matte</label>
            </div>
        </div>
        <div class="control-row">
            <div class="form-group">
                <label for="sidebarFrameColor">Frame Color</label>
                <select id="sidebarFrameColor" onchange="updateSelectedArtwork()">
                    <option value="#8b4513">Brown</option>
                    <option value="#000000">Black</option>
                    <option value="#ffffff">White</option>
                    <option value="#c0c0c0">Silver</option>
                    <option value="#ffd700">Gold</option>
                    <option value="#d2b48c">Birch</option>
                </select>
            </div>
            <div class="form-group">
                <label for="sidebarFrameSize">Frame Width (<span id="sidebarFrameUnit">inches</span>)</label>
                <input type="number" id="sidebarFrameSize" step="0.1" min="0.1" max="5" value="1" onchange="updateSelectedArtwork()">
            </div>
        </div>
        <div class="control-row">
            <div class="form-group">
                <label for="sidebarMatteColor">Matte Color</label>
                <select id="sidebarMatteColor" onchange="updateSelectedArtwork()">
                    <option value="#f5f5f5">Off-White</option>
                    <option value="#ffffff">White</option>
                    <option value="#f0f0f0">Light Gray</option>
                    <option value="#fffacd">Cream</option>
                    <option value="#000000">Black</option>
                </select>
            </div>
            <div class="form-group">
                <label for="sidebarMatteSize">Matte Width (<span id="sidebarMatteUnit">inches</span>)</label>
                <input type="number" id="sidebarMatteSize" step="0.1" min="0.1" max="5" value="1" onchange="updateSelectedArtwork()">
            </div>
        </div>
        <button onclick="deleteSelected()">🗑️ Remove Artwork</button>
    </div>

    <!-- Time of Day Dialog -->
    <div id="dialog-time" class="settings-dialog dialog-time">
        <h4>Time of Day</h4>
        <div class="time-buttons">
            <button class="time-btn" id="time-btn-morning" onclick="setTimeOfDay('morning')">☀️ Morning</button>
            <button class="time-btn time-btn-active" id="time-btn-afternoon" onclick="setTimeOfDay('afternoon')">🌤 Afternoon</button>
            <button class="time-btn" id="time-btn-night" onclick="setTimeOfDay('night')">🌙 Night</button>
        </div>
    </div>

    <!-- Library / Collection Dialog -->
    <div id="dialog-library" class="settings-dialog dialog-library">
        <h4>Collection</h4>
        <div class="form-group">
            <label for="collectionFileInput">Add to collection</label>
            <input type="file" id="collectionFileInput" accept="image/*" multiple>
        </div>
        <div class="collection-list" id="collectionList">
            <!-- Collection items rendered here by JavaScript -->
        </div>
    </div>

    <!-- Hidden container for saved layouts (keeps JS working) -->
    <div id="savedLayouts" style="display: none;"></div>

    <!-- Phase 1: Foundation modules -->
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <!-- Phase 2: Wall module -->
    <script src="js/wall.js"></script>
    <!-- Phase 3: Artwork modules -->
    <script src="js/framing.js"></script>
    <script src="js/artwork.js"></script>
    <script src="js/collection.js"></script>
    <!-- Phase 4: Visual features -->
    <script src="js/distance-guides.js"></script>
    <script src="js/room-view.js"></script>
    <!-- Phase 5: Storage -->
    <script src="js/storage.js"></script>
    <!-- Phase 6: UI and initialization -->
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
